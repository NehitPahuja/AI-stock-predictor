<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Ledger</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Locked Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Quantum Ledger</h1>
                <p class="model-caption">AI MODEL: ALPHA-9</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <span class="icon">📊</span>
                    Terminal
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">🔮</span>
                    Predictions
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">📉</span>
                    Sentiment
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">💼</span>
                    Portfolio
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">⚙️</span>
                    Settings
                </a>
            </nav>

            <button class="btn-primary new-analysis-btn">New Analysis</button>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span><span class="icon">🕒</span> Market Status</span>
                    <span class="status-dot optimal" title="Optimal"></span>
                </div>
                <div class="status-indicator">
                    <span><span class="icon">🧠</span> Model Health</span>
                    <span class="status-text target-green">Optimal</span>
                </div>
                <div class="user-profile">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <span class="username">Analyst_882</span>
                        <span class="tier">Pro Tier</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Scrollable Main Content Area -->
        <main class="main-content">
            <header class="top-nav">
                <div class="nav-tabs">
                    <h2 class="view-title">Terminal_Dashboard</h2>
                    <ul class="tabs">
                        <li class="active">Overview</li>
                        <li>Markets</li>
                        <li>Sectors</li>
                    </ul>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search Assets...">
                </div>
            </header>
            
            <div class="dashboard-grid">
                <!-- Content will go here in future phases (4.2 and beyond) -->
                <p style="color: #6c7293; margin-top: 20px;">Main content area initialized. Ready for Phase 5 widgets.</p>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
